name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  GODOT_VERSION: "4.7"
  EXPORT_NAME: "hardreset"

jobs:
  export-windows:
    name: Export Windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot Editor
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          echo "GODOT_BIN=$(pwd)/Godot_v${GODOT_VERSION}-stable_linux.x86_64" >> "$GITHUB_ENV"

      - name: Download and Install Export Templates
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d "$HOME/.local/share/godot/export_templates/tmp"
          mv "$HOME/.local/share/godot/export_templates/tmp/templates" "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          rm -rf "$HOME/.local/share/godot/export_templates/tmp"

      - name: Import Project Resources
        run: |
          ${{ env.GODOT_BIN }} --headless --import

      - name: Export Windows Desktop
        run: |
          mkdir -p build
          ${{ env.GODOT_BIN }} --headless --export-release "Windows Desktop" "build/${EXPORT_NAME}.exe"
          echo "Export done. Build dir contents:"
          ls -la build/

      - name: Embed PCK into Executable
        run: |
          if [ -f "build/${EXPORT_NAME}.pck" ]; then
            BEFORE=$(stat -c%s "build/${EXPORT_NAME}.exe")
            PCK_SIZE=$(stat -c%s "build/${EXPORT_NAME}.pck")
            cat "build/${EXPORT_NAME}.pck" >> "build/${EXPORT_NAME}.exe"
            rm "build/${EXPORT_NAME}.pck"
            AFTER=$(stat -c%s "build/${EXPORT_NAME}.exe")
            echo "PCK embedded: ${BEFORE} + ${PCK_SIZE} = ${AFTER} bytes"
            echo "Result: single file build/${EXPORT_NAME}.exe"
          else
            echo "No .pck file found — embedding may have already been done by Godot"
            ls -la build/
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-windows
          path: build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/**
          generate_release_notes: true
          name: Hard Reset ${{ github.ref_name }}
