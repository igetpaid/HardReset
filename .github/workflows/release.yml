name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  GODOT_VERSION: "4.7"
  EXPORT_NAME: "hardreset"

jobs:
  export-windows:
    name: Export Windows
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot Editor
        run: |
          $url = "https://github.com/godotengine/godot/releases/download/$env:GODOT_VERSION-stable/Godot_v$env:GODOT_VERSION-stable_win64.exe.zip"
          Write-Output "Downloading Godot editor..."
          Invoke-WebRequest -Uri $url -OutFile "godot_editor.zip"
          Expand-Archive -Path "godot_editor.zip" -DestinationPath "." -Force
          $godotBin = (Resolve-Path ".\Godot_v*.exe").Path
          Add-Content -Path $env:GITHUB_ENV -Value "GODOT_BIN=$godotBin"
          Write-Output "Godot editor: $godotBin"

      - name: Download and Install Export Templates
        run: |
          $templatesDir = "$env:APPDATA\Godot\export_templates"
          New-Item -ItemType Directory -Path $templatesDir -Force | Out-Null
          $url = "https://github.com/godotengine/godot/releases/download/$env:GODOT_VERSION-stable/Godot_v$env:GODOT_VERSION-stable_export_templates.tpz"
          Write-Output "Downloading export templates..."
          Invoke-WebRequest -Uri $url -OutFile "templates.zip"
          Expand-Archive -Path "templates.zip" -DestinationPath "$templatesDir\tmp" -Force
          Move-Item -Path "$templatesDir\tmp\templates" -Destination "$templatesDir\$env:GODOT_VERSION.stable" -Force
          Remove-Item -Path "$templatesDir\tmp" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Output "Templates installed to $templatesDir\$env:GODOT_VERSION.stable"

      - name: Import Project Resources
        run: |
          & $env:GODOT_BIN --headless --import
          if ($LASTEXITCODE -ne 0) { throw "Import failed with exit code $LASTEXITCODE" }

      - name: Export Windows Desktop
        run: |
          New-Item -ItemType Directory -Path "build" -Force | Out-Null
          & $env:GODOT_BIN --headless --export-release "Windows Desktop" "build\$env:EXPORT_NAME.exe"
          if ($LASTEXITCODE -ne 0) { throw "Export failed with exit code $LASTEXITCODE" }
          Write-Output "Build directory contents:"
          Get-ChildItem -Path "build\"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-windows
          path: build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/**
          generate_release_notes: true
          name: Hard Reset ${{ github.ref_name }}
