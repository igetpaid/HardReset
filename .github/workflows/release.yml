name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  EXPORT_NAME: hardreset
  GODOT_VERSION: "4.7"

jobs:
  build:
    name: Windows Build
    runs-on: [self-hosted, windows]
    permissions:
      contents: write
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Find Godot binary
        run: |
          # Priority: GODOT_BIN env var > common install locations
          if (Test-Path "$env:GODOT_BIN") {
            "GODOT_BIN=$env:GODOT_BIN" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Output "Using Godot from env GODOT_BIN: $env:GODOT_BIN"
          } else {
            $paths = @(
              "$HOME\Downloads\Godot_v${env:GODOT_VERSION}-stable_win64.exe",
              "$HOME\Downloads\Godot_v${env:GODOT_VERSION}-stable_win64_console.exe",
              "${env:LOCALAPPDATA}\Godot\godot.exe",
              "C:\Program Files\Godot\godot.exe",
              "C:\Godot\godot.exe"
            )
            $found = $false
            foreach ($p in $paths) {
              if (Test-Path $p) {
                "GODOT_BIN=$p" | Out-File -FilePath $env:GITHUB_ENV -Append
                Write-Output "Found Godot: $p"
                $found = $true
                break
              }
            }
            if (-not $found) {
              throw @"
Godot not found! Either:
1. Set GODOT_BIN system env var: [System.Environment]::SetEnvironmentVariable('GODOT_BIN','C:\path\to\Godot.exe','Machine')
2. Or put Godot in Downloads folder
3. Or install to C:\Program Files\Godot\
"@
            }
          }

      - name: Ensure Export Templates installed
        run: |
          $ver = "${env:GODOT_VERSION}.stable"
          $templateDir = "$env:APPDATA\Godot\export_templates\$ver"
          $checkFile = "$templateDir\windows_x86_64_release.exe"

          if (-not (Test-Path $checkFile)) {
            Write-Output "Export Templates not found. Downloading..."
            New-Item -ItemType Directory -Path $templateDir -Force | Out-Null
            $url = "https://github.com/godotengine/godot/releases/download/${env:GODOT_VERSION}-stable/Godot_v${env:GODOT_VERSION}-stable_export_templates.tpz"
            $tmp = "$env:TEMP\godot_templates"
            New-Item -ItemType Directory -Path $tmp -Force | Out-Null
            Invoke-WebRequest -Uri $url -OutFile "$tmp\templates.tpz"
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [System.IO.Compression.ZipFile]::ExtractToDirectory("$tmp\templates.tpz", "$tmp\extracted")
            Copy-Item -Path "$tmp\extracted\templates\*" -Destination $templateDir -Recurse -Force
            Remove-Item -Path $tmp -Recurse -Force
            Write-Output "Templates installed to $templateDir"
          } else {
            Write-Output "Export Templates already installed at $templateDir"
          }

      - name: Export Windows Desktop
        run: |
          New-Item -ItemType Directory -Path "build" -Force | Out-Null
          $bin = $env:GODOT_BIN
          Write-Output "Running: $bin --headless --export-release Windows Desktop build\$env:EXPORT_NAME.exe"
          & $bin --headless --export-release "Windows Desktop" "build\$env:EXPORT_NAME.exe" 2>&1
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            Write-Output "Export failed with exit code $exitCode"
            Write-Output "Retrying without --headless..."
            & $bin --export-release "Windows Desktop" "build\$env:EXPORT_NAME.exe" 2>&1
            if ($LASTEXITCODE -ne 0) {
              throw "Export failed with exit code $LASTEXITCODE"
            }
          }
          $file = Get-Item "build\$env:EXPORT_NAME.exe"
          Write-Output "Build complete: $($file.FullName) ($([math]::Round($file.Length/1MB, 2)) MB)"
          Get-ChildItem -Path "build\" | ForEach-Object { Write-Output "  $($_.Name) - $([math]::Round($_.Length/1MB, 2)) MB" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/**
          generate_release_notes: true
          name: Hard Reset ${{ github.ref_name }}
